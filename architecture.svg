<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Fira Code', monospace">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1e2a4a"/>
      <stop offset="100%" stop-color="#2d1b4e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4f8ef7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000066"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4f8ef7"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3ecf8e"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f4a535"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#0d0f12"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="48" fill="url(#headerGrad)"/>
  <text x="450" y="30" fill="white" font-size="15" font-weight="700" text-anchor="middle" letter-spacing="1">
    AGENTIC MULTI-MODAL ASSISTANT — ARCHITECTURE
  </text>

  <!-- ── USER / UI layer ──────────────────────────────── -->
  <rect x="20" y="68" width="860" height="64" rx="8" fill="#151820" stroke="#2a2f3f" stroke-width="1" filter="url(#shadow)"/>
  <text x="40" y="88" fill="#7a8299" font-size="10" letter-spacing="1">INPUT LAYER</text>
  <!-- Input boxes -->
  <rect x="36"  y="94" width="100" height="28" rx="5" fill="#1a2f1a" stroke="#3ecf8e" stroke-width="1"/>
  <text x="86"  y="113" fill="#3ecf8e" font-size="11" text-anchor="middle">📝 Text</text>

  <rect x="148" y="94" width="130" height="28" rx="5" fill="#1a1e2e" stroke="#4f8ef7" stroke-width="1"/>
  <text x="213" y="113" fill="#4f8ef7" font-size="11" text-anchor="middle">🖼 Image (JPG/PNG)</text>

  <rect x="290" y="94" width="130" height="28" rx="5" fill="#1e1a2e" stroke="#7c3aed" stroke-width="1"/>
  <text x="355" y="113" fill="#a78bfa" font-size="11" text-anchor="middle">📄 PDF (text/scan)</text>

  <rect x="432" y="94" width="150" height="28" rx="5" fill="#2e1a2e" stroke="#ec4899" stroke-width="1"/>
  <text x="507" y="113" fill="#ec4899" font-size="11" text-anchor="middle">🎙 Audio (MP3/WAV)</text>

  <rect x="594" y="94" width="140" height="28" rx="5" fill="#2e1a1a" stroke="#ef4444" stroke-width="1"/>
  <text x="664" y="113" fill="#ef4444" font-size="11" text-anchor="middle">📺 YouTube URL</text>

  <rect x="746" y="94" width="118" height="28" rx="5" fill="#1a2f2f" stroke="#22d3ee" stroke-width="1"/>
  <text x="805" y="113" fill="#22d3ee" font-size="11" text-anchor="middle">💬 Chat (text)</text>

  <!-- Arrow down to FastAPI -->
  <line x1="450" y1="132" x2="450" y2="158" stroke="#4f8ef7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── FastAPI box ── -->
  <rect x="290" y="160" width="320" height="44" rx="8" fill="#151820" stroke="#4f8ef7" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="290" y="160" width="320" height="44" rx="8" fill="url(#accentGrad)" opacity="0.08"/>
  <text x="450" y="177" fill="#4f8ef7" font-size="11" text-anchor="middle" font-weight="700" letter-spacing="1">FASTAPI  (main.py)</text>
  <text x="450" y="194" fill="#7a8299" font-size="10" text-anchor="middle">POST /chat · GET / · DELETE /session · GET /health</text>

  <!-- Arrow to Orchestrator -->
  <line x1="450" y1="204" x2="450" y2="232" stroke="#4f8ef7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Orchestrator ── -->
  <rect x="200" y="234" width="500" height="100" rx="8" fill="#151820" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="255" fill="#a78bfa" font-size="11" text-anchor="middle" font-weight="700" letter-spacing="1">AGENT ORCHESTRATOR  (agent/orchestrator.py)</text>

  <!-- Steps inside orchestrator -->
  <rect x="218" y="262" width="88" height="22" rx="4" fill="#1a1f2f"/>
  <text x="262" y="278" fill="#4f8ef7" font-size="9" text-anchor="middle">① Extract Content</text>

  <rect x="314" y="262" width="88" height="22" rx="4" fill="#1a1f2f"/>
  <text x="358" y="278" fill="#4f8ef7" font-size="9" text-anchor="middle">② Detect Intent</text>

  <rect x="410" y="262" width="88" height="22" rx="4" fill="#2f2a14"/>
  <text x="454" y="278" fill="#f4a535" font-size="9" text-anchor="middle">③ Clarify?</text>

  <rect x="506" y="262" width="88" height="22" rx="4" fill="#1a1f2f"/>
  <text x="550" y="278" fill="#4f8ef7" font-size="9" text-anchor="middle">④ Build Plan</text>

  <rect x="602" y="262" width="88" height="22" rx="4" fill="#1a2f1a"/>
  <text x="646" y="278" fill="#3ecf8e" font-size="9" text-anchor="middle">⑤ Execute Task</text>

  <!-- Arrows between steps -->
  <line x1="306" y1="273" x2="314" y2="273" stroke="#4f8ef7" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="402" y1="273" x2="410" y2="273" stroke="#4f8ef7" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="498" y1="273" x2="506" y2="273" stroke="#4f8ef7" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="594" y1="273" x2="602" y2="273" stroke="#4f8ef7" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Session state note -->
  <text x="450" y="320" fill="#7a8299" font-size="9" text-anchor="middle">Session dict: pending_content · awaiting_clarification · history</text>

  <!-- ── Arrows from orchestrator down ── -->
  <!-- To extractors -->
  <line x1="270" y1="334" x2="150" y2="380" stroke="#3ecf8e" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <!-- To Intent -->
  <line x1="400" y1="334" x2="400" y2="380" stroke="#7c3aed" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- To Tasks -->
  <line x1="580" y1="334" x2="680" y2="380" stroke="#f4a535" stroke-width="1.2" marker-end="url(#arrow-amber)"/>

  <!-- ── File Extractors box ── -->
  <rect x="20" y="382" width="260" height="180" rx="8" fill="#151820" stroke="#3ecf8e" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="150" y="400" fill="#3ecf8e" font-size="10" text-anchor="middle" font-weight="700" letter-spacing="1">FILE EXTRACTORS</text>

  <rect x="36" y="408" width="228" height="30" rx="5" fill="#1a2e20"/>
  <text x="100" y="421" fill="#3ecf8e" font-size="10">🖼  image_ocr.py</text>
  <text x="100" y="433" fill="#7a8299" font-size="9">Claude Vision → Tesseract fallback</text>

  <rect x="36" y="444" width="228" height="30" rx="5" fill="#1e1a2e"/>
  <text x="100" y="457" fill="#a78bfa" font-size="10">📄  pdf_parser.py</text>
  <text x="100" y="469" fill="#7a8299" font-size="9">PyMuPDF → OCR per scanned page</text>

  <rect x="36" y="480" width="228" height="30" rx="5" fill="#2e1a2e"/>
  <text x="100" y="493" fill="#ec4899" font-size="10">🎙  audio_transcribe.py</text>
  <text x="100" y="505" fill="#7a8299" font-size="9">Whisper base (local)</text>

  <rect x="36" y="516" width="228" height="30" rx="5" fill="#2e1a1a"/>
  <text x="100" y="529" fill="#ef4444" font-size="10">📺  youtube_fetch.py</text>
  <text x="100" y="541" fill="#7a8299" font-size="9">youtube-transcript-api</text>

  <!-- ── Intent Detection box ── -->
  <rect x="310" y="382" width="280" height="80" rx="8" fill="#151820" stroke="#7c3aed" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="450" y="400" fill="#a78bfa" font-size="10" text-anchor="middle" font-weight="700" letter-spacing="1">INTENT DETECTION (Claude LLM)</text>
  <text x="450" y="420" fill="#7a8299" font-size="9" text-anchor="middle">Structured JSON output</text>
  <text x="450" y="435" fill="#4f8ef7" font-size="9" text-anchor="middle">intent · confidence · needs_clarification</text>
  <text x="450" y="450" fill="#7a8299" font-size="9" text-anchor="middle">Fallback: conversational if JSON parse fails</text>

  <!-- ── Task Handlers box ── -->
  <rect x="620" y="382" width="260" height="180" rx="8" fill="#151820" stroke="#f4a535" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="750" y="400" fill="#f4a535" font-size="10" text-anchor="middle" font-weight="700" letter-spacing="1">TASK HANDLERS</text>

  <rect x="636" y="408" width="228" height="22" rx="5" fill="#1a2f1a"/>
  <text x="750" y="424" fill="#3ecf8e" font-size="10" text-anchor="middle">📋  summarize.py  (3 formats)</text>

  <rect x="636" y="436" width="228" height="22" rx="5" fill="#2f2a1a"/>
  <text x="750" y="452" fill="#f4a535" font-size="10" text-anchor="middle">💬  sentiment.py  (label + %)  </text>

  <rect x="636" y="464" width="228" height="22" rx="5" fill="#1a1f2f"/>
  <text x="750" y="480" fill="#4f8ef7" font-size="10" text-anchor="middle">🔍  code_explain.py  (bugs + O(n))</text>

  <rect x="636" y="492" width="228" height="22" rx="5" fill="#2a1a2f"/>
  <text x="750" y="508" fill="#a78bfa" font-size="10" text-anchor="middle">❓  qa.py  (grounded answer)</text>

  <rect x="636" y="520" width="228" height="22" rx="5" fill="#1a2f2f"/>
  <text x="750" y="536" fill="#22d3ee" font-size="10" text-anchor="middle">💡  conversational  (direct LLM)</text>

  <!-- ── Response arrow back up ── -->
  <line x1="450" y1="462" x2="450" y2="490" stroke="#4f8ef7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="462" y="483" fill="#7a8299" font-size="9">response + extracted_text + plan + logs</text>

  <!-- ── Clarification side note ── -->
  <rect x="310" y="476" width="280" height="58" rx="8" fill="#1f1a0d" stroke="#f4a535" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="450" y="494" fill="#f4a535" font-size="10" text-anchor="middle" font-weight="700">⚠ CLARIFICATION GATE</text>
  <text x="450" y="510" fill="#7a8299" font-size="9" text-anchor="middle">If intent = unclear → store content in session</text>
  <text x="450" y="524" fill="#7a8299" font-size="9" text-anchor="middle">→ return question → resume on next turn</text>

  <!-- ── Output label ── -->
  <rect x="310" y="546" width="280" height="52" rx="8" fill="#151820" stroke="#2a2f3f" stroke-width="1"/>
  <text x="450" y="564" fill="#7a8299" font-size="10" text-anchor="middle" font-weight="700" letter-spacing="1">OUTPUT (all text)</text>
  <text x="450" y="580" fill="#4f8ef7" font-size="9" text-anchor="middle">Summary · Sentiment · Code Analysis · Q&amp;A · Transcript</text>
  <text x="450" y="594" fill="#3ecf8e" font-size="9" text-anchor="middle">+ Execution Plan  +  Step-by-Step Logs</text>
</svg>
